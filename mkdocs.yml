site_name: DistriHub Training & Guides
site_url: https://distrihub26.github.io/distrihub-training/
site_description: Practical how-to guides and training for DistriHub ERP users
site_author: DistriHub Team

repo_name: distrihub-training
repo_url: https://github.com/distrihub26/distrihub-training
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    primary: emerald
    accent: teal
  font:
    text: Roboto
  logo: img/logo.png
  favicon: img/logo.png
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.tabs
    - content.code.copy
    - content.action.edit
    - content.action.view

plugins:
  - search
  - glightbox

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Beverage Distributors:
      - Overview: beverage-distributors/index.md
      - Loading for Field Sales: beverage-distributors/loading.md
      - Returnables & Crates: beverage-distributors/returnables.md
      - Deposits & Reconciliation: beverage-distributors/reconciliation.md
  - Core Features: core/index.md
